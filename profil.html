<!DOCTYPE html>
<html lang="en">
<head>
    <title>Profil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --main-color: #eef9ff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
        }

        .custom-navbar {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
        }

        .custom-card {
            background-color: var(--main-color);
            border-radius: 20px;
            transition: 0.3s;
        }

        .custom-card:hover {
            transform: translateY(-5px);
        }

        /* ICON EFFECT 🔥 */
        .icon {
            width: 60px;
            border-radius: 50%;
            transition: 0.3s;
            cursor: pointer;
        }

        .icon:hover {
            transform: scale(1.15);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .icon:active {
            transform: scale(0.9);
        }

        .table-header-blue th {
        background-color: #2a5298;
        color: white;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar m-3 rounded">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">Portofolio</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="beranda.html">Beranda</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="profil.html">Profil</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">

    <!-- Pendidikan -->
    <div class="card custom-card shadow p-4 mb-4">
        <h2>Jenjang Sekolah</h2>

        <table class="table table-bordered mt-3 text-center">
            <thead class="table-header-blue">
                <tr>
                    <th>Jenjang</th>
                    <th>Nama Sekolah</th>
                    <th>Jurusan</th>
                </tr>
                <tr>
                    <td>Universitas</td>
                    <td><a href="https://usk.ac.id/" target="_blank">
                        Universitas Syiah Kuala
                        </a></td>
                    <td>Informatika</td>
                </tr>
                <tr>
                    <td>SMA</td>
                    <td><a href="https://labschoolunsyiah.sch.id/" target="_blank">
                        SMA Laboratorium Unsyiah
                        </a></td>
                    <td>IPA</td>
                </tr>
                <tr>
                    <td>SMP</td>
                    <td><a href="https://smpn6bandaaceh.sch.id/" target="_blank">
                        SMP Negeri 6 Banda Aceh
                        </a></td>
                    <td>-</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Organisasi -->
    <div class="card custom-card shadow p-4 mb-4">
        <h2>Pengalaman Organisasi</h2>
        <ul class="mt-3">
            <li>PMR (2 tahun)</li>
            <li>OSIS (2 tahun)</li>
            <li>HIMPUNAN (-)</li>
        </ul>
    </div>

    <!-- Sosial -->
    <div class="card custom-card shadow p-4 text-center">
        <h2>Hubungi Saya</h2>

        <div class="mt-3 d-flex justify-content-center gap-4">
            <a href="https://github.com/nailahafizha" target="_blank">
                <img src="github.jpeg" class="icon">
            </a>

            <a href="https://instagram.com/nailahafizha" target="_blank">
                <img src="instagram.jpeg" class="icon">
            </a>

            <img src="whatsapp.jpeg" class="icon">
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
